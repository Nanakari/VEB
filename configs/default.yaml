runtime:
  device: cuda
  dtype: float16
  seed: 42

generation:
  backend: llava_hf
  model_family: llava
  model_name_or_path: models/llava-1.5-7b-hf
  temperature: 0.0
  top_p: 1.0
  do_sample: false
  return_token_scores: true
  pope_max_new_tokens: 10
  caption_max_new_tokens: 64

prompts:
  pope: "Please answer the question based on the image.Question: {question}Answer with yes or no."
  caption: "Please describe the image in detail."

datasets:
  pope:
    paths:
      image_root: data/coco/val2014
      annotation_files:
        random: data/pope/coco_pope_random.jsonl
        popular: data/pope/coco_pope_popular.jsonl
        adversarial: data/pope/coco_pope_adversarial.jsonl
  coco_chair:
    paths:
      image_root: data/coco/val2014
      instances_file: data/coco/annotations/instances_val2014.json
      captions_file: data/coco/annotations/captions_val2014.json

object_extraction:
  backend: rule
  spacy_model: en_core_web_sm
  vocabulary_path: configs/vocab/coco_objects.yaml

evidence:
  detector: groundingdino
  cache: true
  evidence_threshold: 0.25
  groundingdino:
    config_path: models/GroundingDINO/groundingdino/config/GroundingDINO_SwinT_OGC.py
    checkpoint_path: models/groundingdino_swint_ogc.pth
    box_threshold: 0.25
    text_threshold: 0.25
    query_template: "{object} ."
    save_boxes: true

veb:
  lambda_gap: 0.8
  tau1: 0.4
  tau2: 0.8
  tau_s: 0.25
  tau_pope: 0.25
  demand:
    aggregation: mean
    fallback_entropy: 0.5
    fallback_margin: 0.5
  revision:
    allowed_rules:
      - preposition_phrase
      - coordination
      - object_np_with_local_pp

outputs:
  root: outputs/main
